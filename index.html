<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IoT Data Monitoring Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="dashboard-container">
        <header>
            <h1>IoT Device Monitoring Dashboard</h1>
            <p>Status: <span id="connection-status" class="status-online">Online</span></p>
        </header>

        <section class="metrics-grid">
            <div class="card">
                <h3>Current Temperature</h3>
                <p class="reading"><span id="temp-val">0</span>°C</p>
            </div>
            <div class="card">
                <h3>Current Humidity</h3>
                <p class="reading"><span id="humid-val">0</span>%</p>
            </div>
        </section>

        <section class="chart-container">
            <h3>Live Sensor Telemetry (Last 10 readings)</h3>
            <canvas id="iotChart"></canvas>
        </section>

        <section class="table-container">
            <h3>Recent Data Logs</h3>
            <table id="data-table">
                <thead>
                    <tr>
                        <th>Timestamp</th>
                        <th>Temperature (°C)</th>
                        <th>Humidity (%)</th>
                    </tr>
                </thead>
                <tbody id="table-body">
                    </tbody>
            </table>
        </section>
    </div>

    <script src="app.js"></script>
</body>
</html>
