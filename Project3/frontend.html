<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Web Elements - Project 3</title>
    <style>
        /* Base Styling - Strict Blue & White Palette */
        :root {
            --bg-primary: #ffffff;
            --bg-secondary: #f0f4f8;
            --text-primary: #002244;
            --text-secondary: #0055ff;
            --accent-blue: #0044cc;
            --border-blue: #b3d1ff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-secondary);
            color: var(--text-primary);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .card {
            background-color: var(--bg-primary);
            border: 2px solid var(--border-blue);
            border-radius: 12px;
            padding: 30px;
            width: 400px;
            box-shadow: 0 8px 24px rgba(0, 68, 204, 0.1);
            text-align: center;
            transition: all 0.3s ease;
        }

        /* Interactive High-Contrast State Toggle */
        .card.alt-theme {
            background-color: var(--accent-blue);
            color: var(--bg-primary);
            border-color: var(--bg-primary);
        }

        .card.alt-theme h2, .card.alt-theme p {
            color: var(--bg-primary);
        }

        h2 {
            color: var(--accent-blue);
            margin-top: 0;
        }

        p {
            color: var(--text-primary);
            font-size: 1.1rem;
            min-height: 60px;
        }

        .btn-container {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 20px;
        }

        button {
            background-color: var(--bg-primary);
            color: var(--text-secondary);
            border: 2px solid var(--text-secondary);
            padding: 10px 18px;
            font-size: 0.9rem;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        button:hover {
            background-color: var(--text-secondary);
            color: var(--bg-primary);
        }

        .card.alt-theme button {
            background-color: var(--bg-primary);
            color: var(--accent-blue);
            border-color: var(--bg-primary);
        }

        .card.alt-theme button:hover {
            background-color: var(--bg-secondary);
            color: var(--text-primary);
        }

        /* Toggle Switch Styling */
        .toggle-container {
            border-top: 1px solid var(--border-blue);
            padding-top: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .switch {
            position: relative;
            display: inline-block;
            width: 50px;
            height: 26px;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: var(--border-blue);
            transition: .4s;
            border-radius: 34px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 18px;
            width: 18px;
            left: 4px;
            bottom: 4px;
            background-color: var(--bg-primary);
            transition: .4s;
            border-radius: 50%;
        }

        input:checked + .slider {
            background-color: var(--text-secondary);
        }

        .card.alt-theme input:checked + .slider {
            background-color: var(--bg-primary);
        }

        .card.alt-theme .slider:before {
            background-color: var(--accent-blue);
        }

        input:checked + .slider:before {
            transform: translateX(24px);
        }
    </style>
</head>
<body>

    <div class="card" id="interactiveCard">
        <h2 id="cardHeader">Interactive Panel</h2>
        <p id="dynamicText">Click a button below to dynamically rewrite this message node.</p>
        
        <div class="btn-container">
            <button class="js-btn" data-message="✨ Pure logic has updated this string in real-time!">Action A</button>
            <button class="js-btn" data-message="⚡ The DOM manipulation process was successful.">Action B</button>
        </div>

        <div class="toggle-container">
            <span>Invert Blue/White Theme</span>
            <label class="switch">
                <input type="checkbox" id="themeToggle">
                <span class="slider"></span>
            </label>
        </div>
    </div>

    <script>
        // Target specific nodes in the DOM tree [cite: 268]
        const card = document.getElementById('interactiveCard');
        const dynamicText = document.getElementById('dynamicText');
        const buttons = document.querySelectorAll('.js-btn');
        const themeToggle = document.getElementById('themeToggle');

        // 1. Process Event Listeners for Content Updates [cite: 269, 270]
        buttons.forEach(button => {
            button.addEventListener('click', (event) => {
                const newText = event.target.getAttribute('data-message');
                // Output Mutation: Update the environment dynamically [cite: 240]
                dynamicText.textContent = newText;
            });
        });

        // 2. Process Event Listener for the UI Toggle Switch [cite: 167, 269]
        themeToggle.addEventListener('change', () => {
            // Output Mutation: Toggle class list to swap colors elegantly
            card.classList.toggle('alt-theme');
        });
    </script>

</body>
</html>
